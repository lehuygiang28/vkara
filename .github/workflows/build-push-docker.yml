name: Build and push Docker images

on:
    push:
        branches:
            - main
            - dev
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            version:
                description: 'Optional image version tag (e.g. 1.2.3)'
                required: false
                type: string
            push_latest:
                description: 'Also push latest tag'
                required: false
                default: false
                type: boolean

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    test-and-build:
        runs-on: ubuntu-latest
        env:
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
            TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.13

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run CI (test, typecheck, lint, build)
              run: bun run ci
              env:
                  NODE_ENV: production
                  NEXT_PUBLIC_APP_URL: https://example.com
                  NEXT_PUBLIC_WS_URL: wss://api.example.com
                  NEXT_PUBLIC_API_URL: https://api.example.com
                  NEXT_PUBLIC_TIKTOK_API_URL: https://api.example.com

    check-skip:
        needs: [test-and-build]
        runs-on: ubuntu-latest
        outputs:
            skip_docker: ${{ steps.check_skip_docker.outputs.skip_docker }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Check if commit message contains [skip docker]
              id: check_skip_docker
              run: |
                  commit_message=$(git log -1 --pretty=%B)
                  if [[ "$commit_message" == *"[skip docker]"* ]]; then
                    echo "skip_docker=true" >> $GITHUB_OUTPUT
                    echo "Skip Docker build and push found in commit message."
                  else
                    echo "skip_docker=false" >> $GITHUB_OUTPUT
                  fi

    build:
        needs: [check-skip]
        if: ${{ needs.check-skip.outputs.skip_docker != 'true' }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            # Web image omitted: NEXT_PUBLIC_* must be set at next build per domain (Vercel or manual docker build).
            matrix:
                app:
                    - name: api
                      image: lehuygiang28/vkara-api
                      dockerfile: ./apps/api/Dockerfile
                    - name: api-redis
                      image: lehuygiang28/vkara-api-redis
                      dockerfile: ./containers/api-redis/Dockerfile
                    - name: aio
                      image: lehuygiang28/vkara-aio
                      dockerfile: ./containers/aio/Dockerfile
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ matrix.app.image }}
                  tags: |
                      type=sha,format=short
                      type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || (github.event_name == 'workflow_dispatch' && github.event.inputs.push_latest == 'true') }}
                      type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
                      type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
                      type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
                      type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
                      type=ref,event=tag

            - name: Build and push ${{ matrix.app.name }} image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ${{ matrix.app.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      TURBO_TEAM=${{ secrets.TURBO_TEAM }}
                  secrets: |
                      TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}
