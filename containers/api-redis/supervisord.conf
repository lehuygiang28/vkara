[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:redis]
command=/usr/bin/redis-server --bind 127.0.0.1 --port 6379 --requirepass giang --save "" --appendonly no
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0  ; Disable log file rotation
stderr_logfile_maxbytes=0  ; Disable log file rotation

[program:api]
command=/app/server
environment=PORT="8000",REDIS_HOST="127.0.0.1",REDIS_PORT="6379",REDIS_PASSWORD="giang",PUBLIC_APP_URL="%(ENV_PUBLIC_APP_URL)s",NODE_ENV="production"
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0  ; Disable log file rotation
stderr_logfile_maxbytes=0  ; Disable log file rotation
