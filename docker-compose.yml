# Profiles: api | web | bundle | aio | whisper
# Examples:
#   docker compose --profile api up
#   docker compose --profile aio up

services:
    vkara_api:
        container_name: vkara-api
        hostname: vkara-api
        profiles:
            - api
        build:
            context: .
            dockerfile: ./apps/api/Dockerfile
        image: lehuygiang28/vkara-api:${COMPOSE_TAG:-latest}
        env_file:
            - path: ./apps/api/.env
              required: false
        ports:
            - 8000:${PORT:-8000}
        networks:
            - vkara_net
        restart: unless-stopped

    api_redis:
        container_name: vkara-api-redis
        hostname: vkara-api-redis
        profiles:
            - bundle
        build:
            context: .
            dockerfile: ./containers/api-redis/Dockerfile
        image: lehuygiang28/vkara-api-redis:${COMPOSE_TAG:-latest}
        env_file:
            - path: ./containers/api-redis/.env
              required: false
            - path: ./containers/api-redis/.env.example
              required: false
        ports:
            - ${BUNDLE_PORT:-8000}:${PORT:-8000}
        networks:
            - vkara_net
        restart: unless-stopped

    vkara_web:
        container_name: vkara-web
        hostname: vkara-web
        profiles:
            - web
        build:
            context: .
            dockerfile: ./apps/web/Dockerfile
            args:
                NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
                NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
                NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        image: lehuygiang28/vkara-web:${COMPOSE_TAG:-latest}
        env_file:
            - path: ./apps/web/.env.local
              required: false
        ports:
            - ${WEB_PORT:-3000}:3000
        networks:
            - vkara_net
        restart: unless-stopped

    vkara_aio:
        container_name: vkara-aio
        hostname: vkara-aio
        profiles:
            - aio
        build:
            context: .
            dockerfile: ./containers/aio/Dockerfile
        image: lehuygiang28/vkara-aio:${COMPOSE_TAG:-latest}
        env_file:
            - path: ./containers/aio/.env
              required: false
            - path: ./containers/aio/.env.example
              required: false
        ports:
            - ${AIO_PORT:-3000}:3000
        restart: unless-stopped

    whisper_stt:
        container_name: vkara-whisper-stt
        hostname: vkara-whisper-stt
        profiles:
            - whisper
        build:
            context: ./containers/whisper-stt
            dockerfile: Dockerfile
        image: vkara-whisper-stt:${COMPOSE_TAG:-latest}
        ports:
            - ${WHISPER_PORT:-7860}:7860
        volumes:
            - whisper_stt_cache:/data
        restart: unless-stopped

networks:
    vkara_net:

volumes:
    whisper_stt_cache:
